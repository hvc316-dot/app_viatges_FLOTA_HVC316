<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Viajes · Control de gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#152238;
    --navy-deep:#0d1626;
    --cream:#F7F3E8;
    --amber:#E8A23D;
    --amber-dark:#C97F1F;
    --line:#D8D0BC;
    --error:#C0392B;
    --ok:#3E7C59;
    font-family:'Inter',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #22335a 0%, var(--navy) 45%, var(--navy-deep) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--navy);
  }
  .stub{
    width:100%;
    max-width:400px;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 30px 60px rgba(0,0,0,.35);
    overflow:hidden;
    position:relative;
  }
  .stub-head{
    background:var(--navy);
    color:var(--cream);
    padding:26px 28px 22px;
    position:relative;
  }
  .eyebrow{
    font-family:'Roboto Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:26px;
    margin-top:6px;
    line-height:1.15;
  }
  .route{
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Roboto Mono',monospace;
    font-size:12px;
    color:#B9C2D6;
  }
  .route .dash{
    flex:1;
    height:1px;
    background:repeating-linear-gradient(90deg,#B9C2D6 0 6px, transparent 6px 12px);
  }
  .perf{
    height:0;
    border-top:2px dashed var(--line);
    position:relative;
    margin:0 -1px;
  }
  .perf::before, .perf::after{
    content:"";
    position:absolute;
    top:-11px;
    width:22px; height:22px;
    background:var(--navy-deep);
    border-radius:50%;
  }
  .perf::before{ left:-11px; background:radial-gradient(circle at 30% 30%, #22335a, var(--navy)); }
  .perf::after{ right:-11px; background:radial-gradient(circle at 30% 30%, #22335a, var(--navy)); }

  .body{ padding:26px 28px 30px; }
  .tabs{
    display:flex;
    background:#EDE7D6;
    border-radius:10px;
    padding:4px;
    margin-bottom:22px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    font-size:13px;
    font-weight:600;
    letter-spacing:.02em;
    border-radius:8px;
    cursor:pointer;
    color:#7A7460;
    transition:all .2s;
    user-select:none;
  }
  .tab.active{
    background:var(--navy);
    color:var(--cream);
  }
  label{
    display:block;
    font-family:'Roboto Mono',monospace;
    font-size:10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#8A8368;
    margin:16px 0 6px;
  }
  input{
    width:100%;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    padding:9px 2px;
    font-size:16px;
    font-family:'Inter',sans-serif;
    color:var(--navy);
    outline:none;
    transition:border-color .2s;
  }
  input:focus{ border-color:var(--amber-dark); }

  button.primary{
    width:100%;
    margin-top:26px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--amber);
    color:var(--navy-deep);
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.02em;
    cursor:pointer;
    transition:transform .12s, background .2s;
  }
  button.primary:active{ transform:scale(.98); }
  button.primary:disabled{ opacity:.55; cursor:default; }
  button.primary:hover:not(:disabled){ background:var(--amber-dark); }

  .msg{
    margin-top:16px;
    font-size:13.5px;
    padding:10px 12px;
    border-radius:8px;
    display:none;
    line-height:1.4;
  }
  .msg.show{ display:block; }
  .msg.error{ background:#FBE4E1; color:var(--error); }
  .msg.ok{ background:#E2F0E7; color:var(--ok); }

  .foot{
    text-align:center;
    margin-top:22px;
    font-size:11.5px;
    color:#A79F86;
    font-family:'Roboto Mono',monospace;
    letter-spacing:.05em;
  }

  .spinner{
    width:16px; height:16px;
    border:2px solid rgba(21,34,56,.25);
    border-top-color:var(--navy-deep);
    border-radius:50%;
    display:inline-block;
    vertical-align:-3px;
    margin-right:8px;
    animation:spin .7s linear infinite;
    display:none;
  }
  .spinner.show{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="stub">
  <div class="stub-head">
    <div class="eyebrow">Tarjeta de acceso</div>
    <h1>Control de gastos de viaje</h1>
    <div class="route">
      <span>ORIGEN</span>
      <div class="dash"></div>
      <span>DESTINO</span>
    </div>
  </div>
  <div class="perf"></div>

  <div class="body">
    <div class="tabs">
      <div class="tab active" data-tab="login">Entrar</div>
      <div class="tab" data-tab="registro">Crear cuenta</div>
    </div>

    <!-- LOGIN -->
    <form id="form-login">
      <label for="li-user">Usuario</label>
      <input id="li-user" type="text" autocomplete="username" required>
      <label for="li-pass">Contraseña</label>
      <input id="li-pass" type="password" autocomplete="current-password" required>
      <button type="submit" class="primary" id="btn-login">
        <span class="spinner" id="sp-login"></span>Entrar
      </button>
      <div class="msg" id="msg-login"></div>
    </form>

    <!-- REGISTRO -->
    <form id="form-registro" style="display:none">
      <label for="re-user">Elige un usuario</label>
      <input id="re-user" type="text" autocomplete="username" required>
      <label for="re-pass">Elige una contraseña</label>
      <input id="re-pass" type="password" autocomplete="new-password" required minlength="4">
      <button type="submit" class="primary" id="btn-registro">
        <span class="spinner" id="sp-registro"></span>Crear cuenta
      </button>
      <div class="msg" id="msg-registro"></div>
    </form>

    <div class="foot">HVC316 · APP DE VIAJES</div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyRyKhZbyzJ2ig03j7yH4xQCRG7SOj9--B9lUThWW_bYlmsdjY6wnEsm1ABry1sq6-5jw/exec";

  // --- tabs ---
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const isLogin = tab.dataset.tab === 'login';
      document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
      document.getElementById('form-registro').style.display = isLogin ? 'none' : 'block';
    });
  });

  function showMsg(id, text, ok){
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg show ' + (ok ? 'ok' : 'error');
  }

  async function callBackend(payload){
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('Error de red: ' + res.status);
    return res.json();
  }

  function setLoading(btnId, spId, loading){
    document.getElementById(btnId).disabled = loading;
    document.getElementById(spId).classList.toggle('show', loading);
  }

  // --- LOGIN ---
  document.getElementById('form-login').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const usuario = document.getElementById('li-user').value.trim();
    const password = document.getElementById('li-pass').value;
    setLoading('btn-login','sp-login', true);
    try{
      const r = await callBackend({ action:'login', usuario, password });
      if(r.ok){
        localStorage.setItem('sesion_usuario', usuario);
        showMsg('msg-login', 'Bienvenido, ' + usuario + '. Entrando…', true);
        // Siguiente paso: redirigir a la pantalla de viajes
      } else {
        showMsg('msg-login', r.error || 'No se pudo iniciar sesión', false);
      }
    } catch(err){
      showMsg('msg-login', 'Error de conexión: ' + err.message, false);
    } finally {
      setLoading('btn-login','sp-login', false);
    }
  });

  // --- REGISTRO ---
  document.getElementById('form-registro').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const usuario = document.getElementById('re-user').value.trim();
    const password = document.getElementById('re-pass').value;
    setLoading('btn-registro','sp-registro', true);
    try{
      const r = await callBackend({ action:'registrar_usuario', usuario, password });
      if(r.ok){
        showMsg('msg-registro', 'Cuenta creada. Espera a que el administrador apruebe tu acceso antes de poder entrar.', true);
        document.getElementById('form-registro').reset();
      } else {
        showMsg('msg-registro', r.error || 'No se pudo crear la cuenta', false);
      }
    } catch(err){
      showMsg('msg-registro', 'Error de conexión: ' + err.message, false);
    } finally {
      setLoading('btn-registro','sp-registro', false);
    }
  });

  // Si ya hay sesión guardada, lo indicamos (de momento solo visual, sin redirección aún)
  if(localStorage.getItem('sesion_usuario')){
    showMsg('msg-login', 'Ya hay una sesión guardada como ' + localStorage.getItem('sesion_usuario') + '.', true);
  }
</script>
</body>
</html>
